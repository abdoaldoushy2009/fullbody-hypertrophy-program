<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8ff3b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8d400;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BARBELL LEFT SLEEVE -->
  <rect x="14" y="88" width="10" height="24" rx="2" fill="url(#barGrad)" opacity="0.9"/>
  <!-- BARBELL LEFT PLATE OUTER -->
  <rect x="24" y="72" width="14" height="56" rx="3" fill="url(#barGrad)" opacity="0.95"/>
  <!-- BARBELL LEFT PLATE INNER -->
  <rect x="38" y="80" width="9" height="40" rx="2" fill="#cccccc" opacity="0.85"/>

  <!-- BARBELL BAR -->
  <rect x="47" y="96" width="168" height="8" rx="4" fill="url(#barGrad)"/>

  <!-- BARBELL RIGHT PLATE INNER -->
  <rect x="215" y="80" width="9" height="40" rx="2" fill="#cccccc" opacity="0.85"/>
  <!-- BARBELL RIGHT PLATE OUTER -->
  <rect x="224" y="72" width="14" height="56" rx="3" fill="url(#barGrad)" opacity="0.95"/>
  <!-- BARBELL RIGHT SLEEVE -->
  <rect x="238" y="88" width="10" height="24" rx="2" fill="url(#barGrad)" opacity="0.9"/>

  <!-- KNURLING MARKS on bar -->
  <g opacity="0.25" fill="#000">
    <rect x="80"  y="96" width="1.5" height="8"/>
    <rect x="86"  y="96" width="1.5" height="8"/>
    <rect x="92"  y="96" width="1.5" height="8"/>
    <rect x="155" y="96" width="1.5" height="8"/>
    <rect x="161" y="96" width="1.5" height="8"/>
    <rect x="167" y="96" width="1.5" height="8"/>
  </g>

  <!-- ACCENT UNDERLINE for text block -->
  <rect x="268" y="158" width="240" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- MAIN TITLE: FULL BODY -->
  <text
    x="268" y="105"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="52"
    font-weight="900"
    letter-spacing="3"
    fill="#ffffff"
    filter="url(#glow)"
  >FULL BODY</text>

  <!-- SUBTITLE: HYPERTROPHY in accent color -->
  <text
    x="270" y="150"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="36"
    font-weight="900"
    letter-spacing="5"
    fill="url(#accentGrad)"
  >HYPERTROPHY</text>

  <!-- TAGLINE -->
  <text
    x="271" y="178"
    font-family="'Courier New', monospace"
    font-size="11"
    letter-spacing="3"
    fill="#666666"
  >3 DAYS · SCIENCE-BASED · FULL GYM</text>

  <!-- ACCENT DOT between barbell and text -->
  <circle cx="258" cy="100" r="4" fill="#e8ff3b" opacity="0.9"/>
  <circle cx="258" cy="100" r="7" fill="none" stroke="#e8ff3b" stroke-width="1" opacity="0.4"/>

</svg>
